# --- Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

# --- Reload ---
bind r source-file ~/.tmux.conf

# --- Splits ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Pane navigation (vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# New window in current path
bind c new-window -c "#{pane_current_path}"

# --- Session switcher ---
bind s display-popup -E -w 60% -h 60% "tmux list-sessions -F '#{session_name}' | fzf --reverse | xargs -r tmux switch-client -t"

# --- New session (prompts for name) ---
bind S command-prompt -p "New session:" "new-session -s '%%'"

# --- Floating terminal ---
bind f display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "TMUX_POPUP=1 exec $SHELL"

# --- Status bar (powerline round, gruvbox light) ---
set -g status-position bottom
set -g status-style "bg=#ebdbb2,fg=#3c3836"
set -g status-left "#[fg=#ebdbb2,bg=#79740e,bold] #S #[fg=#79740e,bg=#ebdbb2] "
set -g status-right ""
set -g status-left-length 20
setw -g window-status-separator ""
setw -g window-status-current-format "#[fg=#ebdbb2,bg=#b57614]#[fg=#fbf1c7,bg=#b57614,bold] #W #[fg=#b57614,bg=#ebdbb2]"
setw -g window-status-format "#[fg=#ebdbb2,bg=#d5c4a1]#[fg=#7c6f64,bg=#d5c4a1] #W #[fg=#d5c4a1,bg=#ebdbb2]"

# --- Pane borders (gruvbox light) ---
set -g pane-border-style "fg=#d5c4a1"
set -g pane-active-border-style "fg=#79740e"

# --- Message style ---
set -g message-style "bg=#ebdbb2,fg=#3c3836"
